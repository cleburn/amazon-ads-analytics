settings:
  target_acos: 0.50
  blended_royalty: 5.00
  high_spend_flag: 5.00
  low_impressions_flag: 10
  attribution_window_days: 14

# Key dates for interpreting trends and annotating reports
timeline:
  book_1_launch: "2024-03"
  book_2_launch: "2025-12"
  email_campaign:
    date: "2025-12"
    description: "3-part email campaign to 460-person list. First sales push for Book 2."
    list_size: 460
  book_2_3_reviews_milestone: "2026-01"
  amazon_ads_start: "2026-01-26"
  campaign_restructure: "2026-02-16"
  campaign_restructure_2:
    date: "2026-02-23"
    description: >
      Shifted ASIN and Deconstruction campaigns from exact to expanded match
      (exact match on cold targets produced zero impressions). Reactivated 4 keywords.
      Raised ASIN Targeting budget to $20/day ($45 total). Integrated per-campaign
      targeting reports into pipeline; removed bid fields from config (bids now
      sourced from weekly targeting report exports).

# Total daily budget: $45 ($20 + $10 + $3 + $12)
# Bids are NOT stored here — they come from weekly targeting report exports.
# The config defines campaign structure (which targets, match types, active/paused).

campaigns:
  asin_targeting:
    name: "Ascension Book2 - ASIN Targeting"
    type: "product_targeting"
    daily_budget: 20.00
    start_date: "2026-01-26"
    note: >
      Mixed match types. Sophia Code runs on both exact + expanded.
      All other targets switched to expanded-only (2026-02-23) after
      exact match produced zero impressions on cold targets.
    targets:
      # Sophia Code — exact + expanded (primary performer, ~70-80% of impressions)
      - asin: "0997935502"
        title: "The Sophia Code (Paperback)"
        match_type: "exact"
      - asin: "0997935502"
        title: "The Sophia Code (Paperback)"
        match_type: "expanded"
      - asin: "B01K1T4U5U"
        title: "The Sophia Code (Kindle)"
        match_type: "exact"
      - asin: "B01K1T4U5U"
        title: "The Sophia Code (Kindle)"
        match_type: "expanded"
      # Other targets — expanded only (switched from exact 2026-02-23)
      - asin: "B00JW44IAI"
        title: "Autobiography of a Yogi (Kindle)"
        match_type: "expanded"
      - asin: "1401953115"
        title: "Becoming Supernatural (Paperback)"
        match_type: "expanded"
      - asin: "B0746RN3G7"
        title: "Becoming Supernatural (Kindle)"
        match_type: "expanded"
      - asin: "1577314808"
        title: "The Power of Now (Paperback)"
        match_type: "expanded"
      - asin: "B002361MLA"
        title: "The Power of Now (Kindle)"
        match_type: "expanded"
      - asin: "1878424319"
        title: "The Four Agreements (Paperback)"
        match_type: "expanded"
    paused_targets:
      # Exact variants paused 2026-02-23 (zero impressions on cold targets)
      - asin: "B00JW44IAI"
        title: "Autobiography of a Yogi (Kindle)"
        match_type: "exact"
        paused_date: "2026-02-23"
      - asin: "1401953115"
        title: "Becoming Supernatural (Paperback)"
        match_type: "exact"
        paused_date: "2026-02-23"
      - asin: "B0746RN3G7"
        title: "Becoming Supernatural (Kindle)"
        match_type: "exact"
        paused_date: "2026-02-23"
      - asin: "1577314808"
        title: "The Power of Now (Paperback)"
        match_type: "exact"
        paused_date: "2026-02-23"
      - asin: "B002361MLA"
        title: "The Power of Now (Kindle)"
        match_type: "exact"
        paused_date: "2026-02-23"
      - asin: "1878424319"
        title: "The Four Agreements (Paperback)"
        match_type: "exact"
        paused_date: "2026-02-23"
      # Paused 2026-02-16 (underperformers from original campaign)
      - asin: "1401941699"
        title: "Power vs. Force (Paperback)"
        paused_date: "2026-02-16"
      - asin: "1401954901"
        title: "Mary Magdalene Revealed (Hardcover)"
        paused_date: "2026-02-16"
      - asin: "1572245379"
